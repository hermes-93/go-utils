version: "3.9"

# Example: use waitfor to delay app startup until DB and Redis are ready.
# Run: docker-compose up

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: alpine:3.19
    depends_on:
      - db
      - redis
    volumes:
      - ./bin:/usr/local/bin
    # waitfor blocks until DB and Redis accept TCP connections, then starts the app.
    command: >
      sh -c "
        devops waitfor --timeout 30 db:5432 &&
        devops waitfor --timeout 30 redis:6379 &&
        echo 'All dependencies ready, starting app...' &&
        sleep infinity
      "
